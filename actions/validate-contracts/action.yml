name: Validate Quantik contracts
description: Validate Quantik contract JSON files and selfplay.v1 JSONL fixtures.
inputs:
  schema-glob:
    description: Glob for JSON schema/metadata files.
    required: false
    default: "schemas/**/*.json"
  fixture-glob:
    description: Glob for selfplay.v1 JSONL fixtures.
    required: false
    default: "fixtures/**/*.jsonl"
  expected-release:
    description: Expected contracts SemVer release, for example 1.0.0.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Validate contract artifacts
      shell: bash
      run: |
        python "${{ github.action_path }}/../../scripts/validate_contracts.py" \
          --schema-glob "${{ inputs['schema-glob'] }}" \
          --fixture-glob "${{ inputs['fixture-glob'] }}" \
          ${EXPECTED_RELEASE_ARG}
      env:
        EXPECTED_RELEASE_ARG: ${{ inputs['expected-release'] != '' && format('--expected-release {0}', inputs['expected-release']) || '' }}
