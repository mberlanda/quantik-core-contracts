name: latest-release-smoke

on:
  workflow_dispatch:
    inputs:
      python-package:
        description: Published Python package name.
        required: false
        default: quantik-core
      rust-crate:
        description: Published Rust crate name.
        required: false
        default: quantik-core
  schedule:
    - cron: "19 3 * * 1"

jobs:
  python-latest:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.ENABLE_RELEASE_SMOKE == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install latest Python package
        run: |
          python -m pip install --upgrade pip
          python -m pip install "${{ inputs['python-package'] || vars.PYTHON_PACKAGE || 'quantik-core' }}"
      - name: Import and validate baseline QFEN
        run: |
          python - <<'PY'
          from quantik_core import bb_from_qfen, bb_to_qfen
          qfen = "..../..../..../...."
          assert bb_to_qfen(bb_from_qfen(qfen)) == qfen
          PY

  rust-latest:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.ENABLE_RELEASE_SMOKE == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install latest Rust crate binary
        run: cargo install "${{ inputs['rust-crate'] || vars.RUST_CRATE || 'quantik-core' }}"
      - name: Report installed crate
        run: cargo install --list
